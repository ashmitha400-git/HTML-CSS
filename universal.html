<!DOCTYPE html>
<html>
    <head><title>universal selector in internal css</title></head>
    <body>
        <style>
           *{
            color:brown;
           }
        </style>
        <h1>it is a universal selector in css</h1>
        <h2>it is another selector in internal css</h2>
        <h3>it is defined by using a(*) star symbol</h3>
        <p>universal selector is applicable for all the tags in the body without defining each tag separately</p>
    </body>
</html>
