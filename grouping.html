<!DOCTYPE html>
<html>
    <head><title>GROUPING IN INTERNAL CSS</title></head>
    <body>
        <style>
            h1,h2,h3,p{
                color: grey;
            }
        </style>
        <h1>i am grouping selector in internal css</h1>
        <h2>it is another selector in internal css</h2>
        <h3>grouping selector uses comma symbol(,)</h3>
        <p>all tags in body can pass styling to all the tags at the same time by separating them with a comma symbol</p>
    </body>
</html>
